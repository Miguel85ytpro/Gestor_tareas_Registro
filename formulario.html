{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4 card-steam">
        <h4 class="text-uppercase">Registro de Usuario</h4>
        <form method="POST">
            <label class="small text-info">NOMBRE DE USUARIO</label>
            <input type="text" name="usuario" class="form-control mb-3" required>

            <label class="small text-info">CONTRASEÑA</label>
            <input type="password" name="password" class="form-control mb-4" required>

            <button type="submit" class="btn btn-steam w-100">REGISTRARSE</button>
        </form>
    </div>
</div>
{% endblock %}
