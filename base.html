<!DOCTYPE html>
<html lang="es">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top, #2a475e, #1b2838); color: #c7d5e0; min-height: 100vh; }
        .navbar { background: #171a21 !important; }
        .btn-steam { background: linear-gradient(to right, #47bfff, #1a44c2); color: white; border: none; }
        .card-steam { background: rgba(0,0,0,0.5); border: 1px solid #3d4450; padding: 20px; }
        input { background: #32353c !important; color: white !important; border: 1px solid #000 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/">MI APP</a>
        <div>
            <a class="text-info me-3" href="/tareas">TAREAS</a>
            
            {% if session.user %}
                <span class="text-white me-2 small">Hola, {{ session.user }}</span>
                <a class="btn btn-outline-danger btn-sm" href="/logout">LOGOUT</a>
            {% else %}
                <a class="btn btn-steam btn-sm" href="/login">LOGIN</a>
            {% endif %}
            
        </div>
    </div>
</nav>
<div class="container">{% block content %}{% endblock %}</div>
</body>
</html>
